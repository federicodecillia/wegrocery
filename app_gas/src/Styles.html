<style>
/* ═══════════════════════════════════════════
   Porta Moneta GAS — Mintlify Design System
   Clean, airy, documentation-grade clarity
   ═══════════════════════════════════════════ */

/* ── Fonts ── */
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Geist+Mono:wght@400;500;600&display=swap');

/* ── Reset ── */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

/* ── Tokens ── */
:root {
  /* Canvas */
  --surface:      #ffffff;
  --surface-alt:  #fafafa;

  /* Brand */
  --brand:        #18E299;
  --brand-light:  #d4fae8;
  --brand-deep:   #0fa76e;

  /* Semantic */
  --danger:       #d45656;
  --danger-light: #fef2f2;
  --warning:      #c37d0d;
  --warning-light:#fffbeb;

  /* Neutral — Mintlify warm gray scale */
  --text:         #0d0d0d;
  --text-2:       #333333;
  --text-3:       #666666;
  --text-4:       #888888;
  --border:       rgba(0,0,0,0.05);
  --border-med:   rgba(0,0,0,0.08);
  --border-solid: #e5e5e5;
  --gray-100:     #f5f5f5;

  /* Spacing — 8px base */
  --sp-1: 4px;  --sp-2: 8px;  --sp-3: 12px;
  --sp-4: 16px; --sp-5: 20px; --sp-6: 24px;
  --sp-8: 32px; --sp-10: 40px;

  /* Radii — Mintlify generous + pill signature */
  --radius:    16px;
  --radius-lg: 24px;
  --radius-sm: 12px;
  --radius-xs: 8px;
  --radius-pill: 9999px;

  /* Shadows — barely-there Mintlify style */
  --shadow-card:   rgba(0,0,0,0.03) 0px 2px 4px;
  --shadow-btn:    rgba(0,0,0,0.06) 0px 1px 2px;
  --shadow-up:     0 -2px 10px rgba(0,0,0,.04);

  /* Sizes */
  --nav-h:    60px;
  --sticky-h: 72px;
  --font:     'Inter', system-ui, -apple-system, sans-serif;
  --font-mono:'Geist Mono', ui-monospace, SFMono-Regular, monospace;
}

/* ── Base ── */
html { font-size: 16px; }
body {
  font-family: var(--font);
  background: var(--surface);
  color: var(--text);
  -webkit-font-smoothing: antialiased;
  padding-bottom: calc(var(--nav-h) + var(--sticky-h) + var(--sp-4));
  min-height: 100dvh;
  line-height: 1.5;
}

/* ── Typography — Inter tight-tracking display ── */
h1 {
  font-size: 1.5rem; font-weight: 600;
  line-height: 1.15; letter-spacing: -0.03em;
  color: var(--text);
}
h2 {
  font-size: 1.125rem; font-weight: 600;
  color: var(--text-2); line-height: 1.3;
  letter-spacing: -0.01em;
}
.text-hero {
  font-size: 2.5rem; font-weight: 600;
  letter-spacing: -0.04em; line-height: 1.15;
}
.text-muted  { color: var(--text-3); font-size: .875rem; }
.text-sm     { font-size: .875rem; }
.text-xs     { font-size: .75rem; font-weight: 500; }

/* ── Layout ── */
.container { max-width: 480px; margin: 0 auto; padding: 0 var(--sp-4); }
.section { display: none; }
.section.active { display: block; animation: fadeIn 200ms ease-out; }

@keyframes fadeIn {
  from { opacity: 0; transform: translateY(4px); }
  to   { opacity: 1; transform: translateY(0); }
}

/* ── Card — Mintlify airy style ── */
.card {
  background: var(--surface);
  border-radius: var(--radius);
  padding: var(--sp-6);
  margin-bottom: var(--sp-3);
  box-shadow: var(--shadow-card);
  border: 1px solid var(--border);
}
.card-elevated {
  background: var(--surface);
  border-radius: var(--radius);
  padding: var(--sp-6);
  margin-bottom: var(--sp-3);
  box-shadow: var(--shadow-card);
  border: 1px solid var(--border);
}
.card-header {
  display: flex; justify-content: space-between;
  align-items: center; margin-bottom: var(--sp-2);
}

/* ── Saldo Hero — clean Mintlify card ── */
.saldo-card {
  text-align: center;
  padding: var(--sp-8) var(--sp-6);
  border-radius: var(--radius-lg);
  margin-bottom: var(--sp-3);
  border: 1px solid var(--border);
}
.saldo-card.positive {
  background: var(--brand-light);
  border-color: rgba(24,226,153,0.2);
}
.saldo-card.negative {
  background: var(--danger-light);
  border-color: rgba(212,86,86,0.2);
}
.saldo-label {
  font-family: var(--font-mono);
  font-size: .75rem; font-weight: 500;
  text-transform: uppercase; letter-spacing: 0.6px;
  margin-bottom: var(--sp-2);
  color: var(--text-3);
}
.saldo-value {
  font-size: 2.5rem; font-weight: 600;
  letter-spacing: -0.04em; line-height: 1.15;
}
.saldo-value.positive { color: var(--brand-deep); }
.saldo-value.negative { color: var(--danger); }
.saldo-sub {
  font-size: .8rem; color: var(--text-3); margin-top: var(--sp-2);
}

/* ── Progress Bar ── */
.progress-bar {
  height: 4px; border-radius: var(--radius-pill);
  background: var(--gray-100);
  overflow: hidden; margin: var(--sp-3) 0 var(--sp-1);
}
.progress-fill {
  height: 100%; border-radius: var(--radius-pill);
  background: var(--brand);
  transition: width 400ms ease-out;
}
.progress-fill.warning { background: var(--warning); }
.progress-fill.danger  { background: var(--danger); }
.progress-text { font-size: .75rem; color: var(--text-4); }

/* ── Badge — Mintlify pill badges ── */
.badge {
  display: inline-flex; align-items: center; gap: 4px;
  padding: 3px 12px; border-radius: var(--radius-pill);
  font-family: var(--font-mono);
  font-size: .65rem; font-weight: 500;
  text-transform: uppercase; letter-spacing: 0.6px;
}
.badge-open    { background: var(--brand-light); color: var(--brand-deep); }
.badge-closed  { background: var(--gray-100); color: var(--text-3); }
.badge-neutral { background: #e8f4fd; color: #1a6fa0; }
.badge-neg     { background: var(--danger-light); color: var(--danger); }
.badge-warn    { background: var(--warning-light); color: var(--warning); }

/* ── Buttons — Mintlify pill shape ── */
.btn {
  display: inline-flex; align-items: center; justify-content: center;
  padding: var(--sp-2) var(--sp-6); gap: var(--sp-2);
  border: none; border-radius: var(--radius-pill);
  font-size: .9375rem; font-weight: 500;
  font-family: var(--font);
  cursor: pointer;
  transition: opacity 150ms, transform 100ms;
  -webkit-tap-highlight-color: transparent;
  touch-action: manipulation;
}
.btn:active { transform: scale(.98); }
.btn:disabled { opacity: .4; cursor: not-allowed; transform: none; }

.btn-primary {
  background: var(--text); color: var(--surface);
  box-shadow: var(--shadow-btn);
}
.btn-primary:hover { opacity: .9; }

.btn-danger {
  background: var(--danger); color: var(--surface);
  box-shadow: var(--shadow-btn);
}
.btn-danger:hover { opacity: .9; }

.btn-outline {
  background: var(--surface);
  border: 1px solid var(--border-med); color: var(--text);
}
.btn-outline:hover { border-color: var(--border-solid); }
.btn-outline:active { background: var(--surface-alt); }

.btn-ghost {
  background: transparent; color: var(--text-2);
  padding: var(--sp-2) var(--sp-3);
  border-radius: var(--radius-xs);
}
.btn-ghost:active { background: var(--gray-100); }

.btn-sm  { padding: 6px var(--sp-4); font-size: .875rem; }
.btn-block { width: 100%; }

/* ── Product Card ── */
.product-card {
  background: var(--surface);
  border-radius: var(--radius);
  padding: var(--sp-4) var(--sp-4) var(--sp-3);
  margin-bottom: var(--sp-2);
  box-shadow: var(--shadow-card);
  border: 1px solid var(--border);
  border-left: 3px solid transparent;
  transition: border-color 200ms, background 200ms, opacity 200ms;
}
.product-card.has-qty {
  border-left-color: var(--brand);
  background: var(--brand-light);
}
.product-card.zero-qty { opacity: .75; }
.product-name { font-weight: 600; font-size: 1rem; color: var(--text); letter-spacing: -0.01em; }
.product-meta { color: var(--text-4); font-size: .82rem; margin-top: 2px; }

.stepper {
  display: flex; align-items: center; justify-content: center;
  gap: var(--sp-4); margin-top: var(--sp-3);
}
.stepper-btn {
  width: 44px; height: 44px;
  border-radius: 50%;
  border: 1px solid var(--border-med);
  background: var(--surface);
  color: var(--text);
  font-size: 1.3rem; font-weight: 600;
  cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  -webkit-tap-highlight-color: transparent;
  transition: background 150ms, border-color 150ms, transform 100ms;
  touch-action: manipulation;
}
.stepper-btn:hover {
  background: var(--brand-light);
  border-color: var(--brand);
}
.stepper-btn:active {
  background: var(--brand-light);
  transform: scale(.92);
}
.stepper-qty {
  font-size: 1.5rem; font-weight: 600;
  min-width: 44px; text-align: center;
  letter-spacing: -0.02em;
  transition: transform 100ms;
}
.stepper-qty.bump { animation: qtyBump 150ms ease; }
@keyframes qtyBump {
  0%   { transform: scale(1); }
  50%  { transform: scale(1.2); }
  100% { transform: scale(1); }
}
.stepper-sub {
  text-align: right; color: var(--text-3);
  font-size: .85rem; font-weight: 500; margin-top: var(--sp-1);
}

/* ── Sticky Order Footer ── */
.sticky-footer {
  position: fixed; bottom: var(--nav-h); left: 0; right: 0;
  background: rgba(255,255,255,.88);
  -webkit-backdrop-filter: blur(12px);
  backdrop-filter: blur(12px);
  border-top: 1px solid var(--border);
  padding: var(--sp-3) var(--sp-4);
  box-shadow: var(--shadow-up);
  z-index: 90;
  display: none;
  transform: translateY(100%);
  transition: transform 250ms ease;
}
.sticky-footer.visible {
  display: block;
  transform: translateY(0);
}
.sticky-footer .footer-row {
  max-width: 480px; margin: 0 auto;
  display: flex; justify-content: space-between; align-items: center;
}
.footer-total   { font-size: 1.1rem; font-weight: 600; letter-spacing: -0.01em; }
.footer-balance { font-size: .8rem; color: var(--text-3); margin-top: 2px; }

/* ── Bottom Navigation — clean white glass ── */
.bottom-nav {
  position: fixed; bottom: 0; left: 0; right: 0;
  background: rgba(255,255,255,.88);
  -webkit-backdrop-filter: blur(12px);
  backdrop-filter: blur(12px);
  border-top: 1px solid var(--border);
  display: flex; justify-content: space-around;
  height: var(--nav-h);
  z-index: 100;
  padding-bottom: env(safe-area-inset-bottom, 0);
}
.nav-item {
  flex: 1; display: flex; flex-direction: column;
  align-items: center; justify-content: center; gap: 2px;
  color: var(--text-4); text-decoration: none;
  font-size: .65rem; font-weight: 500; letter-spacing: .02em;
  cursor: pointer;
  -webkit-tap-highlight-color: transparent;
  transition: color 150ms;
  position: relative;
}
.nav-item.active { color: var(--brand-deep); }
.nav-item svg { width: 22px; height: 22px; }
.nav-item .nav-icon-outline { display: block; }
.nav-item .nav-icon-filled  { display: none; }
.nav-item.active .nav-icon-outline { display: none; }
.nav-item.active .nav-icon-filled  { display: block; }
.nav-badge {
  position: absolute; top: 6px; right: calc(50% - 16px);
  width: 7px; height: 7px;
  background: var(--brand);
  border-radius: 50%;
  animation: pulse 2s ease-in-out infinite;
}
@keyframes pulse {
  0%, 100% { transform: scale(1); opacity: 1; }
  50%      { transform: scale(1.3); opacity: .7; }
}

/* ── Toast — Mintlify minimal ── */
.toast {
  position: fixed; top: var(--sp-4); left: 50%;
  transform: translateX(-50%) translateY(-120px);
  background: var(--text); color: var(--surface);
  padding: var(--sp-3) var(--sp-6);
  border-radius: var(--radius-pill);
  font-weight: 500; font-size: .875rem;
  z-index: 200;
  transition: transform 300ms cubic-bezier(.34,1.56,.64,1);
  box-shadow: var(--shadow-btn);
  max-width: 90%; text-align: center;
}
.toast.toast-error { background: var(--danger); }
.toast.show { transform: translateX(-50%) translateY(0); }

/* ── Modal ── */
.modal-overlay {
  position: fixed; inset: 0;
  background: rgba(0,0,0,.3);
  -webkit-backdrop-filter: blur(4px);
  backdrop-filter: blur(4px);
  display: flex; align-items: center; justify-content: center;
  z-index: 150;
  opacity: 0; pointer-events: none;
  transition: opacity 200ms;
}
.modal-overlay.show { opacity: 1; pointer-events: auto; }
.modal {
  background: var(--surface);
  border-radius: var(--radius-lg);
  padding: var(--sp-8);
  max-width: 340px; width: 90%;
  text-align: center;
  transform: scale(.97);
  transition: transform 200ms ease-out;
  box-shadow: var(--shadow-card);
  border: 1px solid var(--border);
}
.modal-overlay.show .modal { transform: scale(1); }
.modal h3 { margin-bottom: var(--sp-3); font-size: 1.1rem; font-weight: 600; }
.modal p  { color: var(--text-2); margin-bottom: var(--sp-5); font-size: .9375rem; }
.modal-actions { display: flex; gap: var(--sp-3); justify-content: center; }

/* ── Forms — Mintlify clean inputs ── */
.form-group  { margin-bottom: var(--sp-4); }
.form-label  {
  display: block; font-weight: 500;
  margin-bottom: var(--sp-1);
  font-size: .8125rem; color: var(--text-3);
  text-transform: uppercase; letter-spacing: 0.65px;
}
.form-input, .form-select, .form-textarea {
  width: 100%; padding: var(--sp-3) var(--sp-4);
  border: 1px solid var(--border-med);
  border-radius: var(--radius-xs);
  font-size: 1rem; font-family: var(--font);
  background: var(--surface);
  color: var(--text);
  transition: border-color 150ms;
  height: 48px;
}
.form-input::placeholder, .form-textarea::placeholder { color: var(--text-4); }
.form-input:focus, .form-select:focus, .form-textarea:focus {
  outline: none;
  border-color: var(--brand);
  box-shadow: 0 0 0 1px var(--brand);
}
.form-textarea  { resize: vertical; min-height: 80px; height: auto; }
.form-select-sm { height: 36px; padding: var(--sp-1) var(--sp-3); font-size: .875rem; width: auto; min-width: 100px; }

/* ── Tables ── */
.table-wrap { overflow-x: auto; -webkit-overflow-scrolling: touch; border-radius: var(--radius-xs); }
table { width: 100%; border-collapse: collapse; font-size: .85rem; }
th {
  text-align: left; font-weight: 500;
  padding: var(--sp-2) var(--sp-3);
  border-bottom: 1px solid var(--border-solid);
  color: var(--text-3); font-size: .75rem;
  text-transform: uppercase; letter-spacing: 0.65px;
}
td {
  padding: var(--sp-2) var(--sp-3);
  border-bottom: 1px solid var(--border);
}
tr:last-child td { border-bottom: none; }
.text-right { text-align: right; }

/* ── Admin Tabs ── */
.admin-tabs {
  display: flex; overflow-x: auto; gap: 0;
  border-bottom: 1px solid var(--border);
  margin-bottom: var(--sp-4);
  -webkit-overflow-scrolling: touch;
  scrollbar-width: none;
}
.admin-tabs::-webkit-scrollbar { display: none; }
.admin-tab {
  padding: var(--sp-3) var(--sp-4);
  font-size: .8125rem; font-weight: 500;
  color: var(--text-4);
  cursor: pointer; white-space: nowrap;
  border-bottom: 2px solid transparent;
  margin-bottom: -1px;
  transition: color 150ms, border-color 150ms;
  -webkit-tap-highlight-color: transparent;
}
.admin-tab.active { color: var(--text); border-bottom-color: var(--brand); }
.admin-panel { display: none; }
.admin-panel.active { display: block; animation: fadeIn 200ms ease-out; }

/* ── History ── */
.history-item {
  background: var(--surface);
  border-radius: var(--radius);
  padding: var(--sp-4);
  margin-bottom: var(--sp-2);
  box-shadow: var(--shadow-card);
  border: 1px solid var(--border);
  cursor: pointer;
  transition: border-color 150ms;
}
.history-item:active { border-color: var(--border-med); }
.history-row {
  display: flex; justify-content: space-between; align-items: center;
}
.history-chevron {
  color: var(--text-4); font-size: .8rem;
  transition: transform 250ms ease;
  margin-left: var(--sp-2);
}
.history-item.expanded .history-chevron { transform: rotate(90deg); }
.history-detail {
  max-height: 0; overflow: hidden;
  transition: max-height 300ms ease;
}
.history-item.expanded .history-detail {
  max-height: 500px;
  padding-top: var(--sp-3);
  margin-top: var(--sp-3);
  border-top: 1px solid var(--border);
}

/* ── Ledger ── */
.ledger-item {
  display: flex; justify-content: space-between; align-items: center;
  padding: var(--sp-3) 0;
  border-bottom: 1px solid var(--border);
}
.ledger-item:last-child { border-bottom: none; }
.ledger-type {
  font-family: var(--font-mono);
  font-size: .65rem; font-weight: 500;
  text-transform: uppercase; letter-spacing: 0.6px;
}
.ledger-topup   { color: var(--brand-deep); }
.ledger-charge  { color: var(--danger); }
.ledger-adjust  { color: var(--warning); }

/* ── Skeleton Loading ── */
.skeleton {
  background: linear-gradient(90deg, var(--gray-100) 25%, var(--border-solid) 50%, var(--gray-100) 75%);
  background-size: 200% 100%;
  animation: shimmer 1.5s ease-in-out infinite;
  border-radius: var(--radius-xs);
}
@keyframes shimmer {
  0%   { background-position: 200% 0; }
  100% { background-position: -200% 0; }
}
.skeleton-text   { height: 14px; margin-bottom: var(--sp-2); }
.skeleton-title  { height: 20px; width: 60%; margin-bottom: var(--sp-3); }
.skeleton-hero   { height: 48px; width: 50%; margin: var(--sp-4) auto; }
.skeleton-card {
  background: var(--surface);
  border-radius: var(--radius);
  padding: var(--sp-6);
  margin-bottom: var(--sp-3);
  box-shadow: var(--shadow-card);
  border: 1px solid var(--border);
}

/* ── Loading (fallback) ── */
.loading {
  display: flex; align-items: center; justify-content: center;
  padding: var(--sp-10); color: var(--text-4);
}
.spinner {
  width: 22px; height: 22px;
  border: 2px solid var(--border-solid);
  border-top-color: var(--brand);
  border-radius: 50%;
  animation: spin .6s linear infinite;
  margin-right: var(--sp-3);
}
@keyframes spin { to { transform: rotate(360deg); } }

/* ── Empty State ── */
.empty-state {
  text-align: center; padding: var(--sp-10) var(--sp-4);
}
.empty-state-icon { font-size: 3rem; margin-bottom: var(--sp-3); display: block; }
.empty-state h2   { color: var(--text); margin-bottom: var(--sp-2); }
.empty-state p    { color: var(--text-3); font-size: .9rem; }

/* ── Guide ── */
.guide-steps { display: flex; flex-direction: column; gap: var(--sp-4); }
.guide-step { display: flex; gap: var(--sp-3); align-items: flex-start; }
.guide-num {
  min-width: 28px; height: 28px;
  background: var(--text); color: var(--surface);
  border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  font-weight: 600; font-size: .8rem; flex-shrink: 0;
}
.guide-list { padding-left: var(--sp-5); line-height: 1.7; }
.guide-list li { margin-bottom: var(--sp-2); }
.guide-list code {
  background: var(--gray-100); padding: 2px 6px;
  border-radius: 4px; font-size: .82rem;
  font-family: var(--font-mono);
}

/* ── Utility ── */
.mt-4  { margin-top: var(--sp-1); }
.mt-8  { margin-top: var(--sp-2); }
.mt-16 { margin-top: var(--sp-4); }
.mt-24 { margin-top: var(--sp-6); }
.mb-4  { margin-bottom: var(--sp-1); }
.mb-8  { margin-bottom: var(--sp-2); }
.mb-16 { margin-bottom: var(--sp-4); }
.gap-8 { gap: var(--sp-2); }
.flex  { display: flex; }
.flex-between { display: flex; justify-content: space-between; align-items: center; }
.hidden { display: none !important; }

.balance-big { font-size: 2.4rem; font-weight: 600; letter-spacing: -1px; }
.balance-positive { color: var(--brand-deep); }
.balance-negative { color: var(--danger); }

/* ── Reduced motion ── */
@media (prefers-reduced-motion: reduce) {
  *, *::before, *::after {
    animation-duration: 0.01ms !important;
    transition-duration: 0.01ms !important;
  }
}

/* ── Tablet+ ── */
@media (min-width: 480px) {
  .container { max-width: 480px; }
}
@media (min-width: 768px) {
  .container { max-width: 600px; padding: 0 var(--sp-6); }
  .text-hero, .saldo-value { font-size: 3rem; }
}
</style>
