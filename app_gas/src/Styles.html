<style>
/* ═══════════════════════════════════════════
   Porta Moneta GAS — Design System v2
   ═══════════════════════════════════════════ */

/* ── Reset ── */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

/* ── Tokens ── */
:root {
  /* Primary — Emerald scale */
  --primary-50:   #ecfdf5;
  --primary-100:  #d1fae5;
  --primary-200:  #a7f3d0;
  --primary-500:  #10b981;
  --primary-600:  #059669;
  --primary-700:  #047857;

  /* Semantic */
  --danger:       #ef4444;
  --danger-light: #fef2f2;
  --warning:      #f59e0b;
  --warning-light:#fffbeb;

  /* Neutral */
  --surface:      #ffffff;
  --surface-2:    #f9fafb;
  --surface-3:    #f3f4f6;
  --border:       #e5e7eb;
  --border-strong:#d1d5db;
  --text:         #111827;
  --text-2:       #4b5563;
  --text-3:       #9ca3af;

  /* Spacing — 4px scale */
  --sp-1: 4px;  --sp-2: 8px;  --sp-3: 12px;
  --sp-4: 16px; --sp-5: 20px; --sp-6: 24px;
  --sp-8: 32px; --sp-10: 40px;

  /* Radii */
  --radius:    16px;
  --radius-sm: 12px;
  --radius-xs: 8px;

  /* Shadows */
  --shadow-sm:  0 1px 3px rgba(0,0,0,.06), 0 1px 2px rgba(0,0,0,.04);
  --shadow-md:  0 4px 16px rgba(0,0,0,.08), 0 1px 3px rgba(0,0,0,.04);
  --shadow-up:  0 -2px 10px rgba(0,0,0,.05);

  /* Sizes */
  --nav-h:    60px;
  --sticky-h: 72px;
  --font: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', sans-serif;
}

/* ── Base ── */
html { font-size: 16px; }
body {
  font-family: var(--font);
  background: linear-gradient(180deg, #f0fdf4 0%, var(--surface-2) 30%);
  color: var(--text);
  -webkit-font-smoothing: antialiased;
  padding-bottom: calc(var(--nav-h) + var(--sticky-h) + var(--sp-4));
  min-height: 100dvh;
  line-height: 1.5;
}

/* ── Typography ── */
h1 { font-size: 1.5rem; font-weight: 700; line-height: 1.2; letter-spacing: -0.02em; }
h2 { font-size: 1.125rem; font-weight: 600; color: var(--text-2); line-height: 1.3; }
.text-hero   { font-size: 2.5rem; font-weight: 800; letter-spacing: -0.02em; line-height: 1; }
.text-muted  { color: var(--text-3); font-size: .875rem; }
.text-sm     { font-size: .875rem; }
.text-xs     { font-size: .75rem; font-weight: 500; }

/* ── Layout ── */
.container { max-width: 480px; margin: 0 auto; padding: 0 var(--sp-4); }
.section { display: none; }
.section.active { display: block; animation: fadeSlideIn 200ms ease-out; }

@keyframes fadeSlideIn {
  from { opacity: 0; transform: translateY(6px); }
  to   { opacity: 1; transform: translateY(0); }
}

/* ── Card ── */
.card {
  background: var(--surface);
  border-radius: var(--radius);
  padding: var(--sp-5);
  margin-bottom: var(--sp-3);
  box-shadow: var(--shadow-sm);
  border: 1px solid var(--border);
}
.card-elevated {
  background: var(--surface);
  border-radius: var(--radius);
  padding: var(--sp-5);
  margin-bottom: var(--sp-3);
  box-shadow: var(--shadow-md);
  border: none;
}
.card-header {
  display: flex; justify-content: space-between;
  align-items: center; margin-bottom: var(--sp-2);
}

/* ── Saldo Hero ── */
.saldo-card {
  text-align: center;
  padding: var(--sp-6) var(--sp-5);
  border-radius: var(--radius);
  margin-bottom: var(--sp-3);
  box-shadow: var(--shadow-md);
  border: none;
}
.saldo-card.positive {
  background: linear-gradient(135deg, var(--primary-50), var(--surface));
}
.saldo-card.negative {
  background: linear-gradient(135deg, var(--danger-light), var(--surface));
}
.saldo-label { font-size: .875rem; color: var(--text-3); font-weight: 500; margin-bottom: var(--sp-2); }
.saldo-value { font-size: 2.5rem; font-weight: 800; letter-spacing: -0.02em; line-height: 1; }
.saldo-value.positive { color: var(--primary-700); }
.saldo-value.negative { color: var(--danger); }
.saldo-sub { font-size: .8rem; color: var(--text-3); margin-top: var(--sp-2); }

/* ── Progress Bar ── */
.progress-bar {
  height: 6px; border-radius: 3px;
  background: var(--surface-3);
  overflow: hidden; margin: var(--sp-3) 0 var(--sp-1);
}
.progress-fill {
  height: 100%; border-radius: 3px;
  background: var(--primary-500);
  transition: width 400ms ease-out;
}
.progress-fill.warning { background: var(--warning); }
.progress-fill.danger  { background: var(--danger); }
.progress-text { font-size: .75rem; color: var(--text-3); }

/* ── Badge ── */
.badge {
  display: inline-flex; align-items: center; gap: 4px;
  padding: 3px 10px; border-radius: 20px;
  font-size: .7rem; font-weight: 600;
  text-transform: uppercase; letter-spacing: 0.03em;
}
.badge-open   { background: var(--primary-100); color: var(--primary-700); }
.badge-closed { background: var(--surface-3); color: var(--text-2); }
.badge-neg    { background: var(--danger-light); color: var(--danger); }
.badge-warn   { background: var(--warning-light); color: #92400e; }

/* ── Buttons ── */
.btn {
  display: inline-flex; align-items: center; justify-content: center;
  padding: var(--sp-3) var(--sp-6); gap: var(--sp-2);
  border: none; border-radius: var(--radius-sm);
  font-size: 1rem; font-weight: 600;
  cursor: pointer;
  transition: background 150ms, transform 100ms, box-shadow 150ms;
  -webkit-tap-highlight-color: transparent;
  touch-action: manipulation;
}
.btn:active { transform: scale(.97); }
.btn:disabled { opacity: .5; cursor: not-allowed; transform: none; }

.btn-primary {
  background: var(--primary-500); color: var(--surface);
  box-shadow: 0 2px 8px rgba(16,185,129,.25);
}
.btn-primary:hover { background: var(--primary-600); }
.btn-primary:active { box-shadow: 0 1px 4px rgba(16,185,129,.2); }

.btn-danger { background: var(--danger); color: var(--surface); }
.btn-danger:hover { background: #dc2626; }

.btn-outline {
  background: transparent;
  border: 2px solid var(--primary-500); color: var(--primary-600);
}
.btn-outline:active { background: var(--primary-50); }

.btn-ghost {
  background: transparent; color: var(--text-2);
  padding: var(--sp-2) var(--sp-3);
}
.btn-ghost:active { background: var(--surface-3); }

.btn-sm  { padding: var(--sp-2) var(--sp-4); font-size: .875rem; }
.btn-block { width: 100%; }

/* ── Product Card ── */
.product-card {
  background: var(--surface);
  border-radius: var(--radius);
  padding: var(--sp-4) var(--sp-4) var(--sp-3);
  margin-bottom: var(--sp-2);
  box-shadow: var(--shadow-sm);
  border: 1px solid var(--border);
  border-left: 3px solid transparent;
  transition: border-color 200ms, background 200ms, opacity 200ms;
}
.product-card.has-qty {
  border-left-color: var(--primary-500);
  background: var(--primary-50);
  opacity: 1;
}
.product-card.zero-qty { opacity: .5; }
.product-name { font-weight: 700; font-size: 1.05rem; color: var(--text); }
.product-meta { color: var(--text-3); font-size: .82rem; margin-top: 2px; }

.stepper {
  display: flex; align-items: center; justify-content: center;
  gap: var(--sp-4); margin-top: var(--sp-3);
}
.stepper-btn {
  width: 48px; height: 48px;
  border-radius: 50%;
  border: 2px solid var(--primary-500);
  background: var(--surface);
  color: var(--primary-500);
  font-size: 1.4rem; font-weight: 700;
  cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  -webkit-tap-highlight-color: transparent;
  transition: background 150ms, transform 100ms;
  touch-action: manipulation;
}
.stepper-btn:active {
  background: var(--primary-100);
  transform: scale(.92);
}
.stepper-qty {
  font-size: 1.6rem; font-weight: 800;
  min-width: 48px; text-align: center;
  transition: transform 100ms;
}
.stepper-qty.bump { animation: qtyBump 150ms ease; }
@keyframes qtyBump {
  0%   { transform: scale(1); }
  50%  { transform: scale(1.25); }
  100% { transform: scale(1); }
}
.stepper-sub {
  text-align: right; color: var(--text-3);
  font-size: .85rem; font-weight: 600; margin-top: var(--sp-1);
}

/* ── Sticky Order Footer ── */
.sticky-footer {
  position: fixed; bottom: var(--nav-h); left: 0; right: 0;
  background: rgba(255,255,255,.85);
  -webkit-backdrop-filter: blur(16px);
  backdrop-filter: blur(16px);
  border-top: 1px solid var(--border);
  padding: var(--sp-3) var(--sp-4);
  box-shadow: var(--shadow-up);
  z-index: 90;
  display: none;
  transform: translateY(100%);
  transition: transform 250ms ease;
}
.sticky-footer.visible {
  display: block;
  transform: translateY(0);
}
.sticky-footer .footer-row {
  max-width: 480px; margin: 0 auto;
  display: flex; justify-content: space-between; align-items: center;
}
.footer-total   { font-size: 1.15rem; font-weight: 700; }
.footer-balance { font-size: .8rem; color: var(--text-3); margin-top: 2px; }

/* ── Bottom Navigation ── */
.bottom-nav {
  position: fixed; bottom: 0; left: 0; right: 0;
  background: rgba(255,255,255,.8);
  -webkit-backdrop-filter: blur(16px);
  backdrop-filter: blur(16px);
  border-top: 1px solid var(--border);
  display: flex; justify-content: space-around;
  height: var(--nav-h);
  z-index: 100;
  padding-bottom: env(safe-area-inset-bottom, 0);
}
.nav-item {
  flex: 1; display: flex; flex-direction: column;
  align-items: center; justify-content: center; gap: 2px;
  color: var(--text-3); text-decoration: none;
  font-size: .65rem; font-weight: 600; letter-spacing: .02em;
  cursor: pointer;
  -webkit-tap-highlight-color: transparent;
  transition: color 200ms;
  position: relative;
}
.nav-item.active { color: var(--primary-500); }
.nav-item svg { width: 24px; height: 24px; }
.nav-item .nav-icon-outline { display: block; }
.nav-item .nav-icon-filled  { display: none; }
.nav-item.active .nav-icon-outline { display: none; }
.nav-item.active .nav-icon-filled  { display: block; }
.nav-badge {
  position: absolute; top: 6px; right: calc(50% - 16px);
  width: 8px; height: 8px;
  background: var(--primary-500);
  border-radius: 50%;
  animation: pulse 2s ease-in-out infinite;
}
@keyframes pulse {
  0%, 100% { transform: scale(1); opacity: 1; }
  50%      { transform: scale(1.4); opacity: .7; }
}

/* ── Toast ── */
.toast {
  position: fixed; top: var(--sp-4); left: 50%;
  transform: translateX(-50%) translateY(-120px);
  background: var(--primary-600); color: var(--surface);
  padding: var(--sp-3) var(--sp-6);
  border-radius: var(--radius-sm);
  font-weight: 600; font-size: .9rem;
  z-index: 200;
  transition: transform 300ms cubic-bezier(.34,1.56,.64,1);
  box-shadow: 0 8px 24px rgba(0,0,0,.15);
  max-width: 90%; text-align: center;
}
.toast.toast-error { background: var(--danger); }
.toast.show { transform: translateX(-50%) translateY(0); }

/* ── Modal ── */
.modal-overlay {
  position: fixed; inset: 0;
  background: rgba(0,0,0,.35);
  -webkit-backdrop-filter: blur(4px);
  backdrop-filter: blur(4px);
  display: flex; align-items: center; justify-content: center;
  z-index: 150;
  opacity: 0; pointer-events: none;
  transition: opacity 200ms;
}
.modal-overlay.show { opacity: 1; pointer-events: auto; }
.modal {
  background: var(--surface);
  border-radius: var(--radius);
  padding: var(--sp-6);
  max-width: 340px; width: 90%;
  text-align: center;
  transform: scale(.95);
  transition: transform 200ms ease-out;
  box-shadow: var(--shadow-md);
}
.modal-overlay.show .modal { transform: scale(1); }
.modal h3 { margin-bottom: var(--sp-3); font-size: 1.1rem; }
.modal p  { color: var(--text-2); margin-bottom: var(--sp-5); font-size: .95rem; }
.modal-actions { display: flex; gap: var(--sp-3); justify-content: center; }

/* ── Forms ── */
.form-group  { margin-bottom: var(--sp-4); }
.form-label  { display: block; font-weight: 600; margin-bottom: var(--sp-1); font-size: .8rem; color: var(--text-2); text-transform: uppercase; letter-spacing: .03em; }
.form-input, .form-select, .form-textarea {
  width: 100%; padding: var(--sp-3) var(--sp-4);
  border: 1.5px solid var(--border-strong);
  border-radius: var(--radius-sm);
  font-size: 1rem; font-family: var(--font);
  background: var(--surface);
  transition: border-color 200ms, box-shadow 200ms;
  height: 48px;
}
.form-input:focus, .form-select:focus, .form-textarea:focus {
  outline: none;
  border-color: var(--primary-500);
  box-shadow: 0 0 0 3px var(--primary-100);
}
.form-textarea { resize: vertical; min-height: 80px; height: auto; }

/* ── Tables ── */
.table-wrap { overflow-x: auto; -webkit-overflow-scrolling: touch; border-radius: var(--radius-xs); }
table { width: 100%; border-collapse: collapse; font-size: .85rem; }
th {
  text-align: left; font-weight: 600;
  padding: var(--sp-2) var(--sp-3);
  border-bottom: 2px solid var(--border);
  color: var(--text-2); font-size: .75rem;
  text-transform: uppercase; letter-spacing: .03em;
}
td {
  padding: var(--sp-2) var(--sp-3);
  border-bottom: 1px solid var(--surface-3);
}
tr:last-child td { border-bottom: none; }
.text-right { text-align: right; }

/* ── Admin Tabs ── */
.admin-tabs {
  display: flex; overflow-x: auto; gap: 0;
  border-bottom: 2px solid var(--border);
  margin-bottom: var(--sp-4);
  -webkit-overflow-scrolling: touch;
  scrollbar-width: none;
}
.admin-tabs::-webkit-scrollbar { display: none; }
.admin-tab {
  padding: var(--sp-3) var(--sp-4);
  font-size: .8rem; font-weight: 600;
  color: var(--text-3);
  cursor: pointer; white-space: nowrap;
  border-bottom: 2px solid transparent;
  margin-bottom: -2px;
  transition: color 200ms, border-color 200ms;
  -webkit-tap-highlight-color: transparent;
}
.admin-tab.active { color: var(--primary-500); border-bottom-color: var(--primary-500); }
.admin-panel { display: none; }
.admin-panel.active { display: block; animation: fadeSlideIn 200ms ease-out; }

/* ── History ── */
.history-item {
  background: var(--surface);
  border-radius: var(--radius);
  padding: var(--sp-4);
  margin-bottom: var(--sp-2);
  box-shadow: var(--shadow-sm);
  border: 1px solid var(--border);
  cursor: pointer;
  transition: background 150ms;
}
.history-item:active { background: var(--surface-2); }
.history-row {
  display: flex; justify-content: space-between; align-items: center;
}
.history-chevron {
  color: var(--text-3); font-size: .8rem;
  transition: transform 250ms ease;
  margin-left: var(--sp-2);
}
.history-item.expanded .history-chevron { transform: rotate(90deg); }
.history-detail {
  max-height: 0; overflow: hidden;
  transition: max-height 300ms ease;
}
.history-item.expanded .history-detail {
  max-height: 500px;
  padding-top: var(--sp-3);
  margin-top: var(--sp-3);
  border-top: 1px solid var(--surface-3);
}

/* ── Ledger ── */
.ledger-item {
  display: flex; justify-content: space-between; align-items: center;
  padding: var(--sp-3) 0;
  border-bottom: 1px solid var(--surface-3);
}
.ledger-item:last-child { border-bottom: none; }
.ledger-type { font-size: .7rem; font-weight: 600; text-transform: uppercase; letter-spacing: .03em; }
.ledger-topup   { color: var(--primary-600); }
.ledger-charge  { color: var(--danger); }
.ledger-adjust  { color: var(--warning); }

/* ── Skeleton Loading ── */
.skeleton {
  background: linear-gradient(90deg, var(--surface-3) 25%, var(--border) 50%, var(--surface-3) 75%);
  background-size: 200% 100%;
  animation: shimmer 1.5s ease-in-out infinite;
  border-radius: var(--radius-xs);
}
@keyframes shimmer {
  0%   { background-position: 200% 0; }
  100% { background-position: -200% 0; }
}
.skeleton-text   { height: 14px; margin-bottom: var(--sp-2); }
.skeleton-title  { height: 20px; width: 60%; margin-bottom: var(--sp-3); }
.skeleton-hero   { height: 48px; width: 50%; margin: var(--sp-4) auto; }
.skeleton-card {
  background: var(--surface);
  border-radius: var(--radius);
  padding: var(--sp-5);
  margin-bottom: var(--sp-3);
  box-shadow: var(--shadow-sm);
  border: 1px solid var(--border);
}

/* ── Loading (fallback) ── */
.loading {
  display: flex; align-items: center; justify-content: center;
  padding: var(--sp-10); color: var(--text-3);
}
.spinner {
  width: 24px; height: 24px;
  border: 3px solid var(--border);
  border-top-color: var(--primary-500);
  border-radius: 50%;
  animation: spin .6s linear infinite;
  margin-right: var(--sp-3);
}
@keyframes spin { to { transform: rotate(360deg); } }

/* ── Empty State ── */
.empty-state {
  text-align: center; padding: var(--sp-10) var(--sp-4);
}
.empty-state-icon { font-size: 3rem; margin-bottom: var(--sp-3); display: block; }
.empty-state h2   { color: var(--text); margin-bottom: var(--sp-2); }
.empty-state p    { color: var(--text-3); font-size: .9rem; }

/* ── Guide ── */
.guide-steps { display: flex; flex-direction: column; gap: var(--sp-4); }
.guide-step { display: flex; gap: var(--sp-3); align-items: flex-start; }
.guide-num {
  min-width: 32px; height: 32px;
  background: var(--primary-500); color: var(--surface);
  border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  font-weight: 700; font-size: .85rem; flex-shrink: 0;
}
.guide-list { padding-left: var(--sp-5); line-height: 1.7; }
.guide-list li { margin-bottom: var(--sp-2); }
.guide-list code {
  background: var(--surface-3); padding: 2px 6px;
  border-radius: 4px; font-size: .82rem;
}

/* ── Utility ── */
.mt-4  { margin-top: var(--sp-1); }
.mt-8  { margin-top: var(--sp-2); }
.mt-16 { margin-top: var(--sp-4); }
.mt-24 { margin-top: var(--sp-6); }
.mb-4  { margin-bottom: var(--sp-1); }
.mb-8  { margin-bottom: var(--sp-2); }
.mb-16 { margin-bottom: var(--sp-4); }
.gap-8 { gap: var(--sp-2); }
.flex  { display: flex; }
.flex-between { display: flex; justify-content: space-between; align-items: center; }
.hidden { display: none !important; }

.balance-big { font-size: 2.4rem; font-weight: 800; letter-spacing: -1px; }
.balance-positive { color: var(--primary-700); }
.balance-negative { color: var(--danger); }

/* ── Reduced motion ── */
@media (prefers-reduced-motion: reduce) {
  *, *::before, *::after {
    animation-duration: 0.01ms !important;
    transition-duration: 0.01ms !important;
  }
}

/* ── Tablet+ ── */
@media (min-width: 480px) {
  .container { max-width: 480px; }
}
@media (min-width: 768px) {
  .container { max-width: 600px; padding: 0 var(--sp-6); }
  .text-hero, .saldo-value { font-size: 3rem; }
}
</style>
