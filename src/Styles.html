<style>

    --bg: #f1f4ef;
    --bg-soft: #e6ece6;
    --card: #ffffff;
    --text: #1b261f;
    --muted: #56685a;
    --accent: #1f8a4b;
    --accent-dark: #16663a;
    --warn: #b44632;
    --line: #d2ddd3;
    --shadow: 0 6px 20px rgba(22, 45, 30, 0.08);
  }

  * {
    box-sizing: border-box;
  }

  body {
    margin: 0;
    color: var(--text);
    font-family: "Avenir Next", "Segoe UI", "Trebuchet MS", sans-serif;
    background:

      linear-gradient(160deg, var(--bg-soft), var(--bg));
  }

    max-width: 1150px;
    margin: 0 auto;
    padding: 20px 14px 28px;
    display: grid;
    gap: 14px;
  }

  .app-header {
    display: flex;
    justify-content: space-between;
    align-items: start;
    gap: 12px;
  }

  h1, h2, h3 {
    margin: 0 0 8px;
    letter-spacing: 0.2px;
  }

  h1 {
    font-size: 44px;
    line-height: 1;
  }

  h2 {
    font-size: 34px;
    line-height: 1.1;
  }

  h3 {
    font-size: 28px;
    line-height: 1.2;
  }

  .subtitle {
    margin: 0;
    font-size: 16px;
    color: var(--muted);
  }

  .pill {
    background: #e8f6ec;
    border: 1px solid #c2e2cc;
    border-radius: 999px;
    padding: 8px 14px;
    font-size: 15px;
    font-weight: 600;
    white-space: nowrap;
  }

  .cards-row {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
    gap: 12px;
  }

  .admin-layout {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(360px, 1fr));
    gap: 12px;
  }

  .card {
    background: var(--card);
    border: 1px solid var(--line);
    border-radius: 18px;
    padding: 16px;
    box-shadow: var(--shadow);
  }

  .intro-card {
    background: linear-gradient(180deg, #fbfefc 0%, #f4faf6 100%);
  }

  .guide-steps {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
    gap: 10px;
    margin-top: 8px;
  }

  .guide-step {
    display: grid;
    grid-template-columns: 34px 1fr;
    gap: 10px;
    align-items: start;
    background: #ffffff;
    border: 1px solid var(--line);
    border-radius: 12px;
    padding: 10px;

    height: 34px;
    border-radius: 50%;
    background: #1f8a4b;
    color: #fff;
    display: grid;
    place-items: center;
    font-weight: 700;
  }

  .guide-step p {
    margin: 0;
    font-size: 14px;

    background: #f8fbf8;
    border: 1px solid var(--line);
    border-radius: 12px;
    padding: 10px;
  }

  .mini-card label {
    color: var(--muted);
    font-size: 13px;
    display: block;
    margin-bottom: 6px;
  }

  .big {
    font-size: 52px;
    font-weight: 800;
    line-height: 1;
    margin: 0;
  }

  .muted {
    color: var(--muted);
    font-size: 14px;
  }

  .field-label {
    display: block;
    font-size: 14px;
    margin-top: 6px;
    font-weight: 700;
  }

    margin: 0 0 4px;
    color: var(--muted);
    font-size: 13px;
    line-height: 1.35;

  }

    font-size: 16px;
    transition: box-shadow .15s ease, border-color .15s ease;

    border-color: #5ca275;
    box-shadow: 0 0 0 3px rgba(48, 132, 80, 0.18);
  }

    min-height: 120px;
    resize: vertical;
  }

    border-radius: 12px;
    padding: 11px 15px;
    background: var(--accent);
    color: #fff;
    font-size: 20px;
    font-weight: 700;
    cursor: pointer;
    transition: transform .08s ease, background .12s ease;
  }

  .btn:hover {
    background: var(--accent-dark);
  }

  .btn:active {
    transform: translateY(1px);
  }

  .btn.warn {
    background: var(--warn);
  }

  .order-footer {
    display: flex;
    justify-content: space-between;
    align-items: center;
    gap: 10px;
    margin-top: 12px;
  }

  .stack-row {
    display: flex;
    flex-wrap: wrap;
    gap: 10px;
    align-items: center;
  }

  .status-line {
    background: rgba(255, 255, 255, 0.75);
    border: 1px dashed #c8d5ca;
    border-radius: 10px;
    padding: 10px 12px;
    min-height: 42px;
    display: flex;
    align-items: center;
  }

  .hidden {
    display: none;
  }

  @media (max-width: 768px) {
    h1 { font-size: 36px; }
    h2 { font-size: 28px; }
    h3 { font-size: 24px; }

    .order-footer {
      flex-direction: column;
      align-items: flex-start;
    }
    .app-header {
      flex-direction: column;
      align-items: flex-start;
    }
  }
